[env]
# pgrx-pg-sys runs bindgen with libclang. When VS Code is launched outside
# vcvars64.bat, libclang does not inherit the MSVC/Windows SDK include paths and
# fails on pg_config_os.h -> crtdefs.h. Keep this aligned with the installed
# Visual Studio C++ workload and Windows SDK.
BINDGEN_EXTRA_CLANG_ARGS_x86_64_pc_windows_msvc = { value = '-I"C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Tools\MSVC\14.51.36231\include" -I"C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Tools\MSVC\14.51.36231\ATLMFC\include" -I"C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\VS\include" -I"C:\Program Files (x86)\Windows Kits\10\Include\10.0.26100.0\ucrt" -I"C:\Program Files (x86)\Windows Kits\10\Include\10.0.26100.0\um" -I"C:\Program Files (x86)\Windows Kits\10\Include\10.0.26100.0\shared" -I"C:\Program Files (x86)\Windows Kits\10\Include\10.0.26100.0\winrt" -I"C:\Program Files (x86)\Windows Kits\10\Include\10.0.26100.0\cppwinrt"' }

[target.aarch64-apple-darwin]
# PostgreSQL extensions intentionally resolve server symbols from the hosting
# postmaster on macOS instead of linking against a PostgreSQL client library.
rustflags = ["-C", "link-arg=-Wl,-undefined,dynamic_lookup"]
