name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_HTTP_TIMEOUT: "120"
  CARGO_NET_RETRY: "10"
  PGL_VALIDATE_PGLOGICAL_VERSION: "2.5.3"
  PGL_VALIDATE_UPSTREAM_PGLOGICAL_COMMIT: "ba94ce240e39054550d5587a236154c4bcbe602f"
  PGL_VALIDATE_UPSTREAM_PGLOGICAL_REPOSITORY: "2ndQuadrant/pglogical"
  PGL_VALIDATE_UPSTREAM_PGLOGICAL_VERSION: "REL2_4_7"
  RUST_BACKTRACE: "1"

jobs:
  scripts-check:
    name: PowerShell scripts
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5

      - name: Install PSScriptAnalyzer
        run: Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Check scripts
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/check-powershell.ps1

  design-check:
    name: design catalog DDL
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5

      - name: Check design catalog DDL
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/check-design-catalog-ddl.ps1

  pgrx-tests:
    name: pgrx pg${{ matrix.pg }} / ${{ matrix.target.platform }}
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17, 18]
        target:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-2025-vs2026
            platform: windows-x64
            msvc_arch: x64
          - os: windows-11-vs2026-arm
            platform: windows-arm64-hosted-x64
            msvc_arch: x64
            rust_toolchain: stable-x86_64-pc-windows-msvc
          - os: macos-26
            platform: macos-arm64
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          $toolchain = '${{ matrix.target.rust_toolchain }}'
          $explicitToolchain = -not [string]::IsNullOrWhiteSpace($toolchain)
          if ([string]::IsNullOrWhiteSpace($toolchain)) {
            $toolchain = 'stable'
          }
          $installArgs = @('toolchain', 'install', $toolchain, '--profile', 'minimal')
          if ($toolchain -like '*x86_64-pc-windows-msvc' -and [Runtime.InteropServices.RuntimeInformation]::OSArchitecture -eq [Runtime.InteropServices.Architecture]::Arm64) {
            $installArgs += '--force-non-host'
          }
          rustup @installArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($explicitToolchain -and $env:GITHUB_ENV) {
            "PGL_VALIDATE_RUST_TOOLCHAIN=$toolchain" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
          if ($explicitToolchain) {
            & rustc "+$toolchain" --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & cargo "+$toolchain" --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          else {
            rustc --version
            cargo --version
          }

      - name: Cache cargo artifacts
        if: matrix.target.platform != 'windows-arm64-hosted-x64'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-pgrx*
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.pgrx
            target
          key: cargo-pgrx-pg${{ matrix.pg }}-${{ matrix.target.platform }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-pgrx-pg${{ matrix.pg }}-${{ matrix.target.platform }}-

      - name: Set up PostgreSQL and pgrx
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/ci-setup.ps1 -PgMajor ${{ matrix.pg }}

      - name: Install pglogical release
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/install-pglogical-release.ps1 -PgMajor ${{ matrix.pg }} -Version $env:PGL_VALIDATE_PGLOGICAL_VERSION

      - name: Run pgrx pg_test suite
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-pgrx.ps1 -PgMajor ${{ matrix.pg }} -TimeoutSeconds 600

      - name: Run pgrx regress suite
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-pgrx-regress.ps1 -PgMajor ${{ matrix.pg }} -TimeoutSeconds 300

      - name: Run async worker smoke harness
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-async-worker.ps1 -PgMajor ${{ matrix.pg }} -TimeoutSeconds 180

      - name: Clean test clusters
        if: always()
        run: ./scripts/stop-pgrx-test-clusters.ps1 -RemoveData

  pglogical:
    name: pglogical pg${{ matrix.pg }} / ${{ matrix.target.platform }}
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17, 18]
        target:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-2025-vs2026
            platform: windows-x64
            msvc_arch: x64
          - os: windows-11-vs2026-arm
            platform: windows-arm64-hosted-x64
            msvc_arch: x64
            rust_toolchain: stable-x86_64-pc-windows-msvc
          - os: macos-26
            platform: macos-arm64
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          $toolchain = '${{ matrix.target.rust_toolchain }}'
          $explicitToolchain = -not [string]::IsNullOrWhiteSpace($toolchain)
          if ([string]::IsNullOrWhiteSpace($toolchain)) {
            $toolchain = 'stable'
          }
          $installArgs = @('toolchain', 'install', $toolchain, '--profile', 'minimal')
          if ($toolchain -like '*x86_64-pc-windows-msvc' -and [Runtime.InteropServices.RuntimeInformation]::OSArchitecture -eq [Runtime.InteropServices.Architecture]::Arm64) {
            $installArgs += '--force-non-host'
          }
          rustup @installArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($explicitToolchain -and $env:GITHUB_ENV) {
            "PGL_VALIDATE_RUST_TOOLCHAIN=$toolchain" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
          if ($explicitToolchain) {
            & rustc "+$toolchain" --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & cargo "+$toolchain" --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          else {
            rustc --version
            cargo --version
          }

      - name: Cache cargo artifacts
        if: matrix.target.platform != 'windows-arm64-hosted-x64'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-pgrx*
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.pgrx
            target
          key: cargo-pglogical-pg${{ matrix.pg }}-${{ matrix.target.platform }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-pglogical-pg${{ matrix.pg }}-${{ matrix.target.platform }}-

      - name: Set up PostgreSQL and pgrx
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/ci-setup.ps1 -PgMajor ${{ matrix.pg }}

      - name: Install pglogical release
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/install-pglogical-release.ps1 -PgMajor ${{ matrix.pg }} -Version $env:PGL_VALIDATE_PGLOGICAL_VERSION

      - name: Run pglogical fence harness
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-pglogical-fence.ps1 -PgMajor ${{ matrix.pg }} -TimeoutSeconds 300

      - name: Clean test clusters
        if: always()
        run: ./scripts/stop-pgrx-test-clusters.ps1 -RemoveData

  pglogical-vanilla:
    name: vanilla pglogical pg${{ matrix.pg }} / ${{ matrix.target.platform }}
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17, 18]
        target:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-26
            platform: macos-arm64
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustc --version
          cargo --version

      - name: Cache cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-pgrx*
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.pgrx
            target
          key: cargo-pglogical-vanilla-pg${{ matrix.pg }}-${{ matrix.target.platform }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-pglogical-vanilla-pg${{ matrix.pg }}-${{ matrix.target.platform }}-

      - name: Set up PostgreSQL and pgrx
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/ci-setup.ps1 -PgMajor ${{ matrix.pg }}

      - name: Install vanilla pglogical source
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass
          -File ./scripts/install-pglogical-release.ps1
          -PgMajor ${{ matrix.pg }}
          -Repository $env:PGL_VALIDATE_UPSTREAM_PGLOGICAL_REPOSITORY
          -Version $env:PGL_VALIDATE_UPSTREAM_PGLOGICAL_VERSION
          -ExpectedCommit $env:PGL_VALIDATE_UPSTREAM_PGLOGICAL_COMMIT
          -InstallMode source

      - name: Run pglogical fence harness
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-pglogical-fence.ps1 -PgMajor ${{ matrix.pg }} -TimeoutSeconds 300

      - name: Clean test clusters
        if: always()
        run: ./scripts/stop-pgrx-test-clusters.ps1 -RemoveData

  pglogical-mixed-major:
    name: pglogical mixed pg15-to-pg18 / ${{ matrix.target.platform }}
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-2025-vs2026
            platform: windows-x64
            msvc_arch: x64
          - os: windows-11-vs2026-arm
            platform: windows-arm64-hosted-x64
            msvc_arch: x64
            rust_toolchain: stable-x86_64-pc-windows-msvc
          - os: macos-26
            platform: macos-arm64
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          $toolchain = '${{ matrix.target.rust_toolchain }}'
          $explicitToolchain = -not [string]::IsNullOrWhiteSpace($toolchain)
          if ([string]::IsNullOrWhiteSpace($toolchain)) {
            $toolchain = 'stable'
          }
          $installArgs = @('toolchain', 'install', $toolchain, '--profile', 'minimal')
          if ($toolchain -like '*x86_64-pc-windows-msvc' -and [Runtime.InteropServices.RuntimeInformation]::OSArchitecture -eq [Runtime.InteropServices.Architecture]::Arm64) {
            $installArgs += '--force-non-host'
          }
          rustup @installArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($explicitToolchain -and $env:GITHUB_ENV) {
            "PGL_VALIDATE_RUST_TOOLCHAIN=$toolchain" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
          if ($explicitToolchain) {
            & rustc "+$toolchain" --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & cargo "+$toolchain" --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          else {
            rustc --version
            cargo --version
          }

      - name: Cache cargo artifacts
        if: matrix.target.platform != 'windows-arm64-hosted-x64'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-pgrx*
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.pgrx
            target
          key: cargo-pglogical-mixed-pg15-pg18-${{ matrix.target.platform }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-pglogical-mixed-pg15-pg18-${{ matrix.target.platform }}-

      - name: Set up PostgreSQL 15 and pgrx
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/ci-setup.ps1 -PgMajor 15

      - name: Set up PostgreSQL 18 and pgrx
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/ci-setup.ps1 -PgMajor 18

      - name: Run mixed-major pglogical harness
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-pglogical-mixed-major.ps1 -ProviderPgMajor 15 -TargetPgMajor 18 -TimeoutSeconds 300 -BuildTimeoutSeconds 600

      - name: Clean test clusters
        if: always()
        run: ./scripts/stop-pgrx-test-clusters.ps1 -RemoveData

  replication-harnesses:
    name: ${{ matrix.backend }} pg${{ matrix.pg }} / ${{ matrix.target.platform }}
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17, 18]
        backend: [native-logical, physical-standby]
        target:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-2025-vs2026
            platform: windows-x64
            msvc_arch: x64
          - os: windows-11-vs2026-arm
            platform: windows-arm64-hosted-x64
            msvc_arch: x64
            rust_toolchain: stable-x86_64-pc-windows-msvc
          - os: macos-26
            platform: macos-arm64
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          $toolchain = '${{ matrix.target.rust_toolchain }}'
          $explicitToolchain = -not [string]::IsNullOrWhiteSpace($toolchain)
          if ([string]::IsNullOrWhiteSpace($toolchain)) {
            $toolchain = 'stable'
          }
          $installArgs = @('toolchain', 'install', $toolchain, '--profile', 'minimal')
          if ($toolchain -like '*x86_64-pc-windows-msvc' -and [Runtime.InteropServices.RuntimeInformation]::OSArchitecture -eq [Runtime.InteropServices.Architecture]::Arm64) {
            $installArgs += '--force-non-host'
          }
          rustup @installArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($explicitToolchain -and $env:GITHUB_ENV) {
            "PGL_VALIDATE_RUST_TOOLCHAIN=$toolchain" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
          if ($explicitToolchain) {
            & rustc "+$toolchain" --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & cargo "+$toolchain" --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          else {
            rustc --version
            cargo --version
          }

      - name: Cache cargo artifacts
        if: matrix.target.platform != 'windows-arm64-hosted-x64'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-pgrx*
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.pgrx
            target
          key: cargo-${{ matrix.backend }}-pg${{ matrix.pg }}-${{ matrix.target.platform }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.backend }}-pg${{ matrix.pg }}-${{ matrix.target.platform }}-

      - name: Set up PostgreSQL and pgrx
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/ci-setup.ps1 -PgMajor ${{ matrix.pg }}

      - name: Run native logical harness
        if: matrix.backend == 'native-logical'
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-native-logical-fence.ps1 -PgMajor ${{ matrix.pg }} -TimeoutSeconds 300

      - name: Run physical standby harness
        if: matrix.backend == 'physical-standby'
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-physical-standby-fence.ps1 -PgMajor ${{ matrix.pg }} -TimeoutSeconds 300

      - name: Clean test clusters
        if: always()
        run: ./scripts/stop-pgrx-test-clusters.ps1 -RemoveData
