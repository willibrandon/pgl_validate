name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  pgrx-tests:
    name: pgrx pg${{ matrix.pg }} / ${{ matrix.target.platform }}
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17, 18]
        target:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-2025-vs2026
            platform: windows-x64
            msvc_arch: x64
          - os: windows-11-vs2026-arm
            platform: windows-arm64
            msvc_arch: arm64
            rust_toolchain: stable-aarch64-pc-windows-msvc
            postgres_from_source: true
          - os: windows-11-vs2026-arm
            platform: windows-arm64-hosted-x64
            msvc_arch: x64
            rust_toolchain: stable-x86_64-pc-windows-msvc
          - os: macos-26
            platform: macos-arm64
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          $toolchain = '${{ matrix.target.rust_toolchain }}'
          if ([string]::IsNullOrWhiteSpace($toolchain)) {
            $toolchain = 'stable'
          }
          rustup toolchain install $toolchain --profile minimal
          rustup default $toolchain
          rustc --version
          cargo --version

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-pgrx-pg${{ matrix.pg }}-${{ matrix.target.platform }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-pgrx-pg${{ matrix.pg }}-${{ matrix.target.platform }}-

      - name: Cache source-built PostgreSQL
        if: ${{ matrix.target.postgres_from_source == true }}
        uses: actions/cache@v4
        with:
          path: ~/.pgrx/postgresql-*
          key: postgres-source-pg${{ matrix.pg }}-${{ matrix.target.platform }}-v1

      - name: Set up PostgreSQL and pgrx
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
          PGL_VALIDATE_POSTGRES_FROM_SOURCE: ${{ matrix.target.postgres_from_source }}
        run: |
          $setupArgs = @('-NoProfile', '-ExecutionPolicy', 'Bypass', '-File', './scripts/ci-setup.ps1', '-PgMajor', '${{ matrix.pg }}')
          if ($env:PGL_VALIDATE_POSTGRES_FROM_SOURCE -eq 'true') {
            $setupArgs += '-BuildPostgresFromSource'
          }
          ./scripts/pgrx-vs.ps1 pwsh @setupArgs

      - name: Install pglogical release
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/install-pglogical-release.ps1 -PgMajor ${{ matrix.pg }}

      - name: Run pgrx pg_test suite
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-pgrx.ps1 -PgMajor ${{ matrix.pg }} -TimeoutSeconds 1800

      - name: Run async worker smoke harness
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-async-worker.ps1 -PgMajor ${{ matrix.pg }} -TimeoutSeconds 180

      - name: Clean test clusters
        if: always()
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/stop-pgrx-test-clusters.ps1 -RemoveData

  pglogical:
    name: pglogical pg${{ matrix.pg }} / ${{ matrix.target.platform }}
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17, 18]
        target:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-2025-vs2026
            platform: windows-x64
            msvc_arch: x64
          - os: windows-11-vs2026-arm
            platform: windows-arm64
            msvc_arch: arm64
            rust_toolchain: stable-aarch64-pc-windows-msvc
            postgres_from_source: true
          - os: windows-11-vs2026-arm
            platform: windows-arm64-hosted-x64
            msvc_arch: x64
            rust_toolchain: stable-x86_64-pc-windows-msvc
          - os: macos-26
            platform: macos-arm64
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          $toolchain = '${{ matrix.target.rust_toolchain }}'
          if ([string]::IsNullOrWhiteSpace($toolchain)) {
            $toolchain = 'stable'
          }
          rustup toolchain install $toolchain --profile minimal
          rustup default $toolchain
          rustc --version
          cargo --version

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-pglogical-pg${{ matrix.pg }}-${{ matrix.target.platform }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-pglogical-pg${{ matrix.pg }}-${{ matrix.target.platform }}-

      - name: Cache source-built PostgreSQL
        if: ${{ matrix.target.postgres_from_source == true }}
        uses: actions/cache@v4
        with:
          path: ~/.pgrx/postgresql-*
          key: postgres-source-pg${{ matrix.pg }}-${{ matrix.target.platform }}-v1

      - name: Set up PostgreSQL and pgrx
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
          PGL_VALIDATE_POSTGRES_FROM_SOURCE: ${{ matrix.target.postgres_from_source }}
        run: |
          $setupArgs = @('-NoProfile', '-ExecutionPolicy', 'Bypass', '-File', './scripts/ci-setup.ps1', '-PgMajor', '${{ matrix.pg }}')
          if ($env:PGL_VALIDATE_POSTGRES_FROM_SOURCE -eq 'true') {
            $setupArgs += '-BuildPostgresFromSource'
          }
          ./scripts/pgrx-vs.ps1 pwsh @setupArgs

      - name: Install pglogical release
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/install-pglogical-release.ps1 -PgMajor ${{ matrix.pg }}

      - name: Run pglogical fence harness
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-pglogical-fence.ps1 -PgMajor ${{ matrix.pg }} -TimeoutSeconds 900

      - name: Clean test clusters
        if: always()
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/stop-pgrx-test-clusters.ps1 -RemoveData

  replication-harnesses:
    name: ${{ matrix.backend }} pg${{ matrix.pg }} / ${{ matrix.target.platform }}
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17, 18]
        backend: [native-logical, physical-standby]
        target:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-2025-vs2026
            platform: windows-x64
            msvc_arch: x64
          - os: windows-11-vs2026-arm
            platform: windows-arm64
            msvc_arch: arm64
            rust_toolchain: stable-aarch64-pc-windows-msvc
            postgres_from_source: true
          - os: windows-11-vs2026-arm
            platform: windows-arm64-hosted-x64
            msvc_arch: x64
            rust_toolchain: stable-x86_64-pc-windows-msvc
          - os: macos-26
            platform: macos-arm64
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          $toolchain = '${{ matrix.target.rust_toolchain }}'
          if ([string]::IsNullOrWhiteSpace($toolchain)) {
            $toolchain = 'stable'
          }
          rustup toolchain install $toolchain --profile minimal
          rustup default $toolchain
          rustc --version
          cargo --version

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.backend }}-pg${{ matrix.pg }}-${{ matrix.target.platform }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.backend }}-pg${{ matrix.pg }}-${{ matrix.target.platform }}-

      - name: Cache source-built PostgreSQL
        if: ${{ matrix.target.postgres_from_source == true }}
        uses: actions/cache@v4
        with:
          path: ~/.pgrx/postgresql-*
          key: postgres-source-pg${{ matrix.pg }}-${{ matrix.target.platform }}-v1

      - name: Set up PostgreSQL and pgrx
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
          PGL_VALIDATE_POSTGRES_FROM_SOURCE: ${{ matrix.target.postgres_from_source }}
        run: |
          $setupArgs = @('-NoProfile', '-ExecutionPolicy', 'Bypass', '-File', './scripts/ci-setup.ps1', '-PgMajor', '${{ matrix.pg }}')
          if ($env:PGL_VALIDATE_POSTGRES_FROM_SOURCE -eq 'true') {
            $setupArgs += '-BuildPostgresFromSource'
          }
          ./scripts/pgrx-vs.ps1 pwsh @setupArgs

      - name: Run native logical harness
        if: matrix.backend == 'native-logical'
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-native-logical-fence.ps1 -PgMajor ${{ matrix.pg }} -TimeoutSeconds 900

      - name: Run physical standby harness
        if: matrix.backend == 'physical-standby'
        env:
          PGL_VALIDATE_MSVC_ARCH: ${{ matrix.target.msvc_arch }}
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-physical-standby-fence.ps1 -PgMajor ${{ matrix.pg }} -TimeoutSeconds 900

      - name: Clean test clusters
        if: always()
        run: ./scripts/pgrx-vs.ps1 pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/stop-pgrx-test-clusters.ps1 -RemoveData
